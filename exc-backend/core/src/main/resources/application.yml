server:
  port: 8096

spring:
  application:
    name: exchange-system
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/exchange_db?useUnicode=true&useSSL=false&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      name: DruidDataSource
      initial-size: 1
      min-idle: 1
      max-active: 20
      async-init: true
      max-wait: 6000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 900000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      connection-init-sqls: SET NAMES utf8mb4 COLLATE utf8mb4_0900_ai_ci;
      filters: stat
  redis:
    host: 127.0.0.1
    port: 6379
    password: 01star
    database: 0
    # Redisson 连接池配置
    redisson:
      connection-pool-size: 64
      idle-connection-timeout: 10000
      connect-timeout: 10000
      timeout: 3000

# Web3j 配置
