server:
  port: 8096

spring:
  application:
    name: exchange-system
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/exchange_db?useUnicode=true&useSSL=false&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      name: DruidDataSource
      initial-size: 1
      min-idle: 1
      max-active: 20
      async-init: true
      max-wait: 6000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 900000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      connection-init-sqls: SET NAMES utf8mb4 COLLATE utf8mb4_0900_ai_ci;
      filters: stat
  redis:
    host: 127.0.0.1
    port: 6379
    password: 01star
    database: 0
    # Redisson 连接池配置
    redisson:
      connection-pool-size: 64
      idle-connection-timeout: 10000
      connect-timeout: 10000
      timeout: 3000
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    # 生产者确认模式
    publisher-confirm-type: correlated
    publisher-returns: true
    # 消费者配置
    listener:
      simple:
        # 手动 ACK 模式
        acknowledge-mode: manual
        # 最小并发消费者数
        concurrency: 3
        # 最大并发消费者数
        max-concurrency: 10
        # 每次预取消息数（限流）
        prefetch: 1
        # 消费失败后是否重新入队
        default-requeue-rejected: false
        # 重试配置
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          max-interval: 10000
          multiplier: 2


# Web3j 配置
web3j:
  node-url: https://eth-sepolia.g.alchemy.com/v2/eh_dEB9V7MnEnkpfNh5xq
  network-id: 11155111
  private-key: c20eea3133007bbf18c1b2221029695e9ba385930864e8c2f5e7489e2c3d9ec3
  gas-price: 20000000000
  gas-limit: 4000000
  # 新增的 Web3j 超时配置 (毫秒)
  connect-timeout: 30000 # 连接超时 30 秒
  read-timeout: 120000   # 读取超时 120 秒
  ens:
    enabled: false  # 禁用ENS解析

# JWT 配置
jwt:
